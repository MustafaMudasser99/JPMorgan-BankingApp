<style>
    #chat-widget-container {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
        font-family: 'Manrope', sans-serif;
    }
    #chat-launcher {
        background-color: #004a99;
        color: white;
        border: none;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #chat-window {
        display: none; /* Hidden by default */
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 300px;
        height: 400px;
        background: white;
        border-radius: 12px;
        flex-direction: column;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        border: 1px solid #ddd;
        overflow: hidden;
    }
    .chat-header { background: #004a99; color: white; padding: 12px; font-weight: bold; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #fdfdfd; }
    .msg { padding: 8px 12px; border-radius: 10px; font-size: 13px; max-width: 80%; }
    .user-msg { align-self: flex-end; background: #004a99; color: white; }
    .bot-msg { align-self: flex-start; background: #eee; color: #333; }
    #chat-form { display: flex; border-top: 1px solid #eee; padding: 10px; }
    #chat-input { flex: 1; border: 1px solid #ddd; padding: 5px 10px; border-radius: 4px; outline: none; }
</style>

<div id="chat-widget-container">
    <button id="chat-launcher">💬</button>
    <div id="chat-window">
        <div class="chat-header">Crypto Knight Assistant</div>
        <div id="chat-messages">
            <div class="msg bot-msg">Hello! How can I help you?</div>
        </div>
        <form id="chat-form">
            <input type="text" id="chat-input" placeholder="Type here..." autocomplete="off">
            <button type="submit" style="background:none; border:none; color:#004a99; font-weight:bold; cursor:pointer; margin-left:5px;">Send</button>
        </form>
    </div>
</div>

<script>
    (function() {
        const btn = document.getElementById('chat-launcher');
        const win = document.getElementById('chat-window');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('chat-input');
        const msgBox = document.getElementById('chat-messages');

        btn.onclick = () => {
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if(!text) return;

            // Add user bubble
            const uDiv = document.createElement('div');
            uDiv.className = 'msg user-msg';
            uDiv.innerText = text;
            msgBox.appendChild(uDiv);
            input.value = '';

            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                
                // Add bot bubble
                const bDiv = document.createElement('div');
                bDiv.className = 'msg bot-msg';
                bDiv.innerText = data.text;
                msgBox.appendChild(bDiv);
                msgBox.scrollTop = msgBox.scrollHeight;
            } catch(err) {
                console.error(err);
            }
        };
    })();
</script>
