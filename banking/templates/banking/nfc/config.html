<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFC terminal settings · Crypto Knight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'banking/css/house-style.css' %}">
  <link rel="stylesheet" href="{% static 'banking/css/nfc-terminal.css' %}">
</head>
<body class="nfc-shell nfc-wide">
<header class="nfc-header">
  <a href="{% url 'nfc_terminal:terminal' %}">← Terminal</a>
  <h1>Settings</h1>
  <a href="/banking/dashboard/" class="muted-link">Dashboard</a>
</header>
<main>
  {% csrf_token %}
  <div>
    <label for="acquirer">Acquirer API key (X-API-Key for /api/authorize)</label>
    <input id="acquirer" class="mono" type="text" placeholder="sk_..." autocomplete="off" spellcheck="false">
    <div class="help">The terminal sends this on every charge. If empty, <code>PAYMENT_CARDS_API_KEY</code> from Django settings is used. Saved to <code id="path"></code>.</div>
  </div>
  <div class="row buttons">
    <button type="button" class="primary" id="save" onclick="save()">Save</button>
    <button type="button" class="ghost" onclick="clearKey()">Clear</button>
  </div>
  <div id="status" class="status"></div>
  <div class="meta" id="meta">loading…</div>
</main>
<script>
const NFC = {
  state: "{% url 'nfc_terminal:config_state' %}",
  save: "{% url 'nfc_terminal:config_save' %}",
};
function jsonHeaders() {
  const el = document.querySelector('[name=csrfmiddlewaretoken]');
  return {
    'Content-Type': 'application/json',
    'X-CSRFToken': el ? el.value : '',
  };
}
const $ = id => document.getElementById(id);
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function setStatus(kind, html){ const s = $('status'); s.className = 'status' + (kind ? ' show '+kind : ''); s.innerHTML = html; }

async function load(){
  try {
    const r = await fetch(NFC.state, { credentials: 'same-origin' });
    const s = await r.json();
    $('acquirer').value = s.acquirer_api_key || '';
    $('path').textContent = s.config_path;
    const src = s.source === 'config' ? 'saved in config' : (s.source === 'env' ? 'from ACQUIRER_API_KEY env var' : (s.source === 'django_settings' ? 'from Django PAYMENT_CARDS_API_KEY' : 'unset'));
    $('meta').innerHTML =
      '<b>Network:</b> ' + escapeHtml(s.payment_network_url) + '<br>' +
      '<b>Authorize:</b> ' + escapeHtml(s.authorize_url) + '<br>' +
      '<b>Register card:</b> ' + escapeHtml(s.register_card_url) + '<br>' +
      '<b>Current key source:</b> ' + escapeHtml(src);
  } catch (e) { setStatus('err', escapeHtml(e.message)); }
}

async function save(){
  const key = $('acquirer').value.trim();
  $('save').disabled = true;
  try {
    const r = await fetch(NFC.save, {
      method: 'POST',
      headers: jsonHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ acquirer_api_key: key })
    });
    const body = await r.json();
    if (!r.ok) { setStatus('err', escapeHtml(body.error || r.status)); return; }
    setStatus('ok', 'Saved.');
    load();
  } catch (e) { setStatus('err', escapeHtml(e.message)); }
  finally { $('save').disabled = false; }
}

async function clearKey(){
  $('acquirer').value = '';
  await save();
}

load();
</script>
</body>
</html>
